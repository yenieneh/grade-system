<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <title>የውጤት መመዝገቢያ</title>
    <style>
        body { font-family: sans-serif; font-size: 10px; margin: 5px; }
        /* ሰንጠረዡ እንዲሸብለል የሚያደርግ ክፍል */
        .table-container { 
            width: 100%; 
            overflow-x: auto; /* አግድም ማሸብለል */
            margin-bottom: 20px; 
            border: 1px solid #aaa;
        }
        table { border-collapse: collapse; width: max-content; } /* ስፋቱ እንዲጨምር */
        th, td { border: 1px solid #000; padding: 4px; text-align: center; white-space: nowrap; }
        input { text-align: center; border: none; width: 40px; } /* የሳጥን ስፋት */
        .bg-head { background: #eee; font-weight: bold; }
        .btn-print { padding: 10px; width: 100%; background: #28a745; color: white; border: none; border-radius: 5px; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>
    <h3>የውጤት መመዝገቢያ</h3>
    <div class="table-container">
        <table id="gradeTable">
            <tr class="bg-head">
                <th>ተ.ቁ</th><th>ስም</th><th>ፆታ</th><th>ዕድሜ</th>
                <th>ሙክ(5)</th><th>ክፍል(4)</th><th>ቤት(4)</th><th>ቡድን(4)</th>
                <th>ተሳት(3)</th><th>ተግባር(5)</th><th>የተሰጠ(5)</th><th>ፕሮጅ(5)</th><th>መስክ(5)</th><th>ተጨማሪ(20)</th>
                <th>ድምር(60%)</th><th>ፈተና(40%)</th><th>ጠቅላላ(100%)</th>
            </tr>
            <script>
                const maxes = [5, 4, 4, 4, 3, 5, 5, 5, 5, 20]; 
                for (let i = 1; i <= 70; i++) {
                    let inputs = maxes.map((m) => `<td><input type="number" class="asm-${i}" oninput="validate(this, ${m}); calc(${i})"></td>`).join('');
                    document.write(`
                        <tr id="row-${i}">
                            <td>${i}</td>
                            <td><input type="text" class="sname-${i}" oninput="calc(${i})" style="width:100px;"></td>
                            <td><input type="text" style="width:20px;"></td>
                            <td><input type="number" style="width:20px;"></td>
                            ${inputs}
                            <td><input type="number" class="sum60-${i}" readonly></td>
                            <td><input type="number" class="exam-${i}" oninput="validate(this, 40); calc(${i})"></td>
                            <td><input type="number" class="total100-${i}" readonly></td>
                        </tr>
                    `);
                }
            </script>
        </table>
    </div>

    <button class="btn-print no-print" onclick="window.print()">ሪፖርት አትም (PDF)</button>

    <script>
        function validate(el, max) { if (parseFloat(el.value) > max) el.value = max; if (el.value < 0) el.value = 0; }
        function calc(i) {
            let row = document.getElementById(`row-${i}`);
            let asms = row.querySelectorAll(`.asm-${i}`);
            let sum60 = 0;
            asms.forEach(inp => { sum60 += parseFloat(inp.value) || 0; });
            let examVal = parseFloat(row.querySelector(`.exam-${i}`).value) || 0;
            row.querySelector(`.sum60-${i}`).value = sum60;
            row.querySelector(`.total100-${i}`).value = sum60 + examVal;
        }
    </script>
</body>
</html>
